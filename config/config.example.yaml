# Political Edge Configuration
# API Keys (also settable via environment variables)
api_keys:
  congress_gov: ""          # CONGRESS_GOV_API_KEY env var
  regulations_gov: ""       # REGULATIONS_GOV_API_KEY env var
  quiver_quant: ""          # QUIVER_QUANT_API_KEY env var
  tiingo: ""                # TIINGO_API_KEY env var

# Collection Schedule (cron expressions)
schedule:
  federal_register: "0 */6 * * *"   # Every 6 hours
  congress: "0 */12 * * *"          # Every 12 hours
  usaspending: "0 18 * * 1-5"       # 6pm ET weekdays
  congress_trades: "0 8 * * *"      # Daily 8am
  lobbying: "0 8 1 1,4,7,10 *"     # Quarterly
  market_data: "0 17 * * 1-5"       # 5pm ET weekdays

# Alert Configuration
alerts:
  email: ""
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  smtp_user: ""
  smtp_password: ""  # Gmail app password

  rules:
    - name: "High-Impact Regulatory Event"
      condition: "impact_score >= 4"
      table: "regulatory_events"

    - name: "New Executive Order"
      condition: "event_type = 'executive_order'"
      table: "regulatory_events"

    - name: "FDA Final Rule"
      condition: "agency LIKE '%FDA%' AND event_type = 'final_rule'"
      table: "regulatory_events"

# Collection Settings
collection:
  congress:
    request_delay_seconds: 1.0
    max_pages: 10
  lobbying:
    request_delay_seconds: 1.0
    max_pages: 50
  congress_trades:
    request_delay_seconds: 3.0
    max_pages_per_run: 10
  regulations_gov:
    request_delay_seconds: 1.5
    max_pages: 10

# Initial Watchlist
watchlist:
  defense:
