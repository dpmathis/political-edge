name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check collectors/ analysis/ execution/ scripts/ tests/ dashboard/

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --cov=collectors --cov=analysis --cov=execution --cov-report=term-missing --cov-fail-under=57
