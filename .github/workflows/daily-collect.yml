name: Daily Data Collection

on:
  schedule:
    - cron: '0 11 * * *'  # 6am ET (11:00 UTC)
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Decompress seed database
        run: |
          if [ -f data/seed.db.gz ]; then
            gunzip -c data/seed.db.gz > data/political_edge.db
          else
            python scripts/setup_db.py
          fi
          python scripts/migrate_phase2.py

      - name: Run collectors
        env:
          CONGRESS_GOV_API_KEY: ${{ secrets.CONGRESS_GOV_API_KEY }}
          REGULATIONS_GOV_API_KEY: ${{ secrets.REGULATIONS_GOV_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/run_collectors.py

      - name: Recompress seed
        run: gzip -c data/political_edge.db > data/seed.db.gz

      - name: Commit updated seed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seed.db.gz
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily data collection $(date -u +%Y-%m-%d)"
            git push
          fi
